services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: kern-dev:latest
    container_name: kern-dev
    working_dir: /work
    tty: true
    stdin_open: true
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    environment:
      TERM: xterm-256color
      CARGO_TARGET_DIR: /work/target-linux
      RUST_BACKTRACE: "1"
    volumes:
      - ../:/work
      - cargo-registry:/opt/cargo/registry
      - cargo-git:/opt/cargo/git
      - target-linux:/work/target-linux
      - ${USERPROFILE}/.claude:/root/.claude
      - ${USERPROFILE}/.claude.json:/root/.claude.json
      - ${USERPROFILE}/.config/gh:/root/.config/gh
      - ${USERPROFILE}/.gitconfig:/root/.gitconfig:ro
      - ${USERPROFILE}/.config/relay:/work/.relay
    command: ["/bin/bash"]

volumes:
  cargo-registry:
  cargo-git:
  target-linux:
